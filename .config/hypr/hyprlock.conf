# Variables
$x-sep = 230
$x-sep-l = 100
$text_color = rgb(235, 219, 178)
$font = DejaVu Sans Condensed
$wapath = /home/cyberbee/.cache/hyde/lock_active.set

general {
    immediate_render = true
    no_fade_in = false
}

background {
    monitor =
    path = $wapath
    color = rgba(25, 20, 20, 1.0)
    # contrast = 0.8916

    # # --- The Secret Sauce ---
    # blur_passes = 2           # Real-time GPU blur passes
    # blur_size = 3             # Intensity of the blur
    # brightness = 1.0          # Keeps the main wallpaper look 'sharp'
    # contrast = 1.2            # Boosts clarity
    # --- The Wake-Up Fix ---
    # Forces the background to stay in VRAM
    reload_time = 0
    reload_cmd =
}



shape {
    monitor =
    size = 35%, 100%
    color = rgba(62, 62, 62, 0.5)
    rounding = 0
    border_size = 0
    
    # Shape-Only Blur
    vibrancy = 1.0           # Keep as float (1.0 instead of 1)
    vibrancy_darkness = 0.2
    xray = false
    
    position = 0, 0
    halign = left
    valign = center
}

# Giant Arch Logo - Centered in Top-Left Sidebar
label {
    monitor =
    text = 󰣇
    color = rgba(235, 219, 178, 0.8) 
    font_size = 120
    font_family = $font Bold
    
    # Massive bounding box to prevent ANY clipping
    width = 240                  
    height = 240
    text_align = center         

    # Positioned so it sits nicely in the top-left corner
    position = 20, -20
    halign = left
    valign = top
}
# The Time
label {
    monitor =
    text = $TIME
    color = $text_color
    font_size = 64
    font_family = $font Bold
    position = $x-sep-l, 250
    halign = left
    valign = center
}

# The Date
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%A, %d %B")"
    color = $text_color
    font_size = 35
    font_family = $font
    position = $x-sep-l, 180
    halign = left
    valign = center
}

# Japanese Text
label {
    monitor =
    text = 永遠なれ 
    color = rgba(212, 212, 212, 0.81)
    font_size = 45
    font_family = $font
    position = 210, 80 
    halign = left
    valign = center
    shadow_passes = 2
}

# Username - FIXED TYPO HERE
label {
    monitor =
    text = $USER
    color = rgba(212, 212, 212, 0.81)
    font_size = 32
    font_family = DejaVu Sans Light
    position = $x-sep, 0  # Changed from $s-sep to $x-sep
    halign = left
    valign = center
    shadow_passes = 2
}

input-field {
    monitor =
    size = 250, 50
    outline_thickness = 4
    dots_size = 0.33
    fade_on_empty = false
    outer_color = rgb(235, 219, 178) 
    inner_color = rgba(40, 40, 40, 0.5)
    font_color = rgb(235, 219, 178)
    placeholder_text = <span foreground="##ffffff">Password . . . </span>
    hide_input = true
    position = 200, -90 
    halign = left
    valign = center
}

label {
    monitor =
    text = Current session - Arch Linux / endevor os  
    color = rgba(212, 212, 212, 0.81)
    font_size = 20
    font_family = DejaVu Sans Light
    position = 60, -200 
    halign = left
    valign = center
    shadow_passes = 3
}



# Song Title (Flowing/Wrapping)
label {
    monitor =
    # We use 'sed' to truncate or you can let hyprlock wrap it
    text = cmd[update:1000] echo "$(playerctl metadata title || echo "No Music Playing")"
    color = $text_color
    font_size = 18
    font_family = $font Bold
    
    # --- The Overflow Fix ---
    width = 300                 # Limits text to this width in pixels
    halign = left
    valign = center
    position = 60, -320 
    
    # Optional: Shadow makes wrapping text easier to read
    shadow_passes = 1
}

# Artist Name
label {
    monitor =
    text = cmd[update:1000] echo "$(playerctl metadata artist || echo "Ready to Rock")"
    color = rgba(235, 219, 178, 0.7)
    font_size = 14
    font_family = $font
    
    # Keep width consistent for alignment
    width = 300
    halign = left
    valign = center
    position = 80, -350
}





# Pac-Man Animation at the bottom of the sidebar
label {
    monitor =
    # Update every 100ms for smooth movement
    text = cmd[update:150] echo "$(~/.config/hyde/scripts/pacman_dots.sh)"
    
    # Yellow for Pac-Man, obviously!
    color = rgba(250, 250, 0, 0.22) 
    font_size = 35
    font_family = $font Bold
    
    # Position it at the bottom of your 35% sidebar
    position = $x-sep-l, 50        # 40px from left, 50px from bottom
    halign = left
    valign = bottom
}